      #   run: |
      #     xcodebuild test \
      #       -project PiggyPulse.xcodeproj \
      #       -scheme PiggyPulse \
      #       -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
      #       -configuration Debug \
      #       CODE_SIGNING_ALLOWED=NO \
      #       | xcpretty
